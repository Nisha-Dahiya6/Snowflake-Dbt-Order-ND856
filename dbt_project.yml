name: my_project

profile: my_project

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]

target-path: "target" 

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  my_project:
    +schema: MY_SCHEMA

models:
  my_project:
    # Materialize staging models as views, and marts as tables
    stg:
      +materialized: table
    fact:
      +materialized: table
    dim:
      +materialized: table